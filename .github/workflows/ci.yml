name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  bot-test:
    name: Bot — test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      # Chặn drift: mọi lệnh slash của bot phải có trên trang commands của web.
      - run: node scripts/check-command-sync.js

  web-build:
    name: Web — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # build là cổng chính (không cần secret — trang động render lúc request).
      - run: npm run build
      # lint đã sạch (0 errors) -> gate chặn thật.
      - run: npm run lint
